[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[cronJobs]]
schedule = "*/30 * * * *"
command = "python -c \"import httpx; httpx.post('http://localhost:' + __import__('os').environ.get('PORT','8001') + '/alerts/check')\""
