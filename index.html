const ENGINE_A_URL = window.ENGINE_A_URL || "https://grineos-engine-a-production.up.railway.app";
const PLATFORM_URL = "https://grine-platform-production.up.railway.app";

const T={display:"'Source Serif 4',Georgia,serif",body:"'DM Sans',sans-serif",mono:"'IBM Plex Mono',monospace"};
const C={bg:"#f8f9fb",white:"#ffffff",navy:"#0f1923",navy2:"#1a2332",navyLight:"#2d3a4a",slate:"#475569",soft:"#64748b",faint:"#94a3b8",border:"#e2e8f0",borderLight:"#f1f5f9",accentLight:"rgba(26,35,50,0.06)",green:"#16a34a",greenBg:"rgba(22,163,74,0.06)",red:"#dc2626",redBg:"rgba(220,38,38,0.06)",blue:"#2563eb",blueBg:"rgba(37,99,235,0.06)",gold:"#b45309",goldBg:"rgba(180,83,9,0.06)"};
const CHART_COLORS=["#1a2332","#2563eb","#16a34a","#b45309","#7c3aed","#dc2626","#0891b2","#c026d3","#ea580c","#64748b"];

// ── REGIME COLOURS (matches Engine A) ────────────────────────────────────────
const REGIME_COLORS={
  SURGE:"#16a34a",CRUISE:"#22c55e",PRESSURE:"#b45309",
  SLIDE:"#f97316",SHOCK:"#dc2626",FOG:"#7c3aed"

const REGIME_BG={
  SURGE:"rgba(22,163,74,0.1)",CRUISE:"rgba(34,197,94,0.08)",PRESSURE:"rgba(180,83,9,0.1)",

// ── CONTEXTS ──────────────────────────────────────────────────────────────────
const RegimeContext = createContext();
const useRegime = () => useContext(RegimeContext);
const PortfolioContext = createContext();
const usePortfolio = () => useContext(PortfolioContext);

// ── ENGINE A HOOK ─────────────────────────────────────────────────────────────
function useEngineA() {
  const [summary, setSummary] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);

  const fetchSummary = useCallback(async () => {
    try {
      const res = await fetch(`${ENGINE_A_URL}/regime/summary`);
      if (!res.ok) throw new Error(`Engine A: ${res.status}`);
      const data = await res.json();
      setSummary(data);
      setLastUpdated(new Date());
      setError(null);
    } catch(e) {
      setError(e.message);
      // Keep showing last known summary if available
    } finally {
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchSummary();
    const interval = setInterval(fetchSummary, 5 * 60 * 1000); // refresh every 5min
    return () => clearInterval(interval);
  }, [fetchSummary]);

  return { summary, loading, error, lastUpdated, refresh: fetchSummary };
}

// ── REGIME PROVIDER (powered by Engine A) ────────────────────────────────────
function RegimeProvider({children}) {
  const { summary, loading, error, lastUpdated, refresh } = useEngineA();
  const [overrideMode, setOverrideMode] = useState(false); // manual override

  const regimeCode = summary?.state?.code || "SURGE";
  const regimeConfig = {
    current: regimeCode,
    subtitle: summary?.state?.subtitle || "Risk Expansion",
    label: regimeCode,
    color: REGIME_COLORS[regimeCode] || "#16a34a",
    bgColor: REGIME_BG[regimeCode] || "rgba(22,163,74,0.1)",
    confidence: summary?.state?.confidence || 0,
    confidenceDelta: summary?.state?.confidence_delta || 0,
    persistence: summary?.state?.confidence_persistence || 0,
    duration: summary?.state?.duration_days || 0,
    description: summary?.state?.description || "",
    instinct: summary?.state?.instinct || "",
    tagline: summary?.state?.tagline || "",
    drivers: summary?.state?.drivers || {},
    transitions: summary?.transitions || [],
    narrative: summary?.narrative || null,
    exposure: summary?.exposure || null,
  };

  return (
    <RegimeContext.Provider value={{
      regimeConfig,
      summary,
      loading,
      error,
      lastUpdated,
      refresh,
      overrideMode,
      setOverrideMode,
    }}>
      {children}
    </RegimeContext.Provider>
  );
}

const apiFetch=async(url,token,opts={})=>{
  const h={"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})};
  const r=await fetch(url,{...opts,headers:h});
  const d=await r.json();
  if(!r.ok)throw new Error(typeof d.detail==="string"?d.detail:JSON.stringify(d.detail||d));
  return d;
};

// ── CHARTS ────────────────────────────────────────────────────────────────────
function DonutChart({data,size=180,thickness=28,totalValue}){
  let chartData=Array.isArray(data)?data:data&&typeof data==="object"?Object.entries(data).map(([k,v])=>({label:k,value:v*(totalValue||1e6)/100})):[];
  chartData=chartData.filter(d=>isFinite(d.value)&&d.value>0);
  if(!chartData.length)return<div style={{width:size,height:size,display:"flex",alignItems:"center",justifyContent:"center",background:C.borderLight,borderRadius:"50%",color:C.soft,fontSize:12}}>No data</div>;
  const total=chartData.reduce((s,d)=>s+d.value,0);if(!total)return null;
  const display=totalValue||total;
  const cx=size/2,cy=size/2,r=(size-thickness)/2;let cum=-90;
  const paths=chartData.map((d,i)=>{
    const pct=d.value/total,angle=pct*360;if(angle<0.01)return null;
    const start=cum;cum+=angle;
    if(angle>=359.99)return<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={CHART_COLORS[i%CHART_COLORS.length]} strokeWidth={thickness} style={{opacity:0.85}}/>;
    const sr=(start*Math.PI)/180,er=(cum*Math.PI)/180;
    const x1=cx+r*Math.cos(sr),y1=cy+r*Math.sin(sr),x2=cx+r*Math.cos(er),y2=cy+r*Math.sin(er);
    if(!isFinite(x1)||!isFinite(y1)||!isFinite(x2)||!isFinite(y2))return null;
    return<path key={i} d={`M ${x1} ${y1} A ${r} ${r} 0 ${angle>180?1:0} 1 ${x2} ${y2}`} fill="none" stroke={CHART_COLORS[i%CHART_COLORS.length]} strokeWidth={thickness} strokeLinecap="round" style={{opacity:0.85}}/>;
  }).filter(Boolean);
  return<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={thickness} opacity={0.3}/>
    {paths}
    <text x={cx} y={cy-6} textAnchor="middle" fill={C.navy2} fontFamily={T.display} fontSize={17} fontWeight={600}>${(display/1e6).toFixed(1)}M</text>
    <text x={cx} y={cy+12} textAnchor="middle" fill={C.soft} fontFamily={T.body} fontSize={10}>Total Value</text>
  </svg>;
}

function HBarChart({data}){
  const maxVal=Math.max(...data.map(d=>Math.abs(d.value)),0.01);
  return<div style={{display:"flex",flexDirection:"column",gap:10}}>
    {data.map((d,i)=>{
      const pct=Math.abs(d.value)/maxVal*100,isNeg=d.value<0,color=d.color||CHART_COLORS[i%CHART_COLORS.length];
      return<div key={i} style={{animation:`fadeUp 0.3s ease ${i*0.04}s both`}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:13,color:C.navy2,fontWeight:500}}>{d.label}</span>
          <span style={{fontSize:13,fontFamily:T.mono,color:isNeg?C.red:C.navy2,fontWeight:600}}>{typeof d.display==="string"?d.display:(d.value>=0?"+":"")+d.value.toFixed(2)+"%"}</span>
        </div>
        <div style={{height:5,background:C.borderLight,borderRadius:3,overflow:"hidden"}}>
          <div style={{height:"100%",width:`${pct}%`,background:isNeg?C.red:color,borderRadius:3,transition:"width 0.8s ease"}}/>
        </div>
      </div>;
    })}
  </div>;
}

        </div>
      )}

  );
}

const TABS=[{id:"demo",label:"Demo Portfolio"},{id:"agent",label:"Agent"},{id:"optimizer",label:"Optimizer"},{id:"backtest",label:"Backtest"},{id:"scenarios",label:"Scenarios"},{id:"analytics",label:"Analytics"},{id:"news",label:"News"}];

function Dashboard({token,userEmail,onLogout}){
  const[tab,setTab]=useState("demo");const[demoP,setDemoP]=useState(null);const[health,setHealth]=useState(null);
  const{regimeConfig,loading:regimeLoading,error:regimeError}=useRegime();
  useEffect(()=>{
    fetch(`${PLATFORM_URL}/health`).then(r=>r.json()).then(setHealth).catch(()=>setHealth({status:"error"}));
    apiFetch(`${PLATFORM_URL}/api/v1/demo/portfolio`,token).then(setDemoP).catch(()=>{});
  },[token]);
  let content;
  if(tab==="demo")content=<DemoTab demoP={demoP}/>;
  else if(tab==="agent")content=<AgentTab token={token} demoP={demoP}/>;
  else if(tab==="optimizer")content=<EngineTab token={token} demoP={demoP} title="Portfolio Optimizer" desc="Regime-aware allocation optimization." endpoint="/api/v1/optimize" controls={[{key:"objective",label:"Objective",default:"max_sharpe",options:[{value:"max_sharpe",label:"Max Sharpe"},{value:"min_variance",label:"Min Variance"},{value:"risk_parity",label:"Risk Parity"}]}]}/>;
  else if(tab==="backtest")content=<EngineTab token={token} demoP={demoP} title="Backtest Engine" desc="Historical simulation with regime context." endpoint="/api/v1/backtest" controls={[{key:"period",label:"Lookback",default:"3y",options:[{value:"1y",label:"1Y"},{value:"2y",label:"2Y"},{value:"3y",label:"3Y"},{value:"5y",label:"5Y"},{value:"10y",label:"10Y"}]},{key:"rebalance_freq",label:"Rebalance",default:"monthly",options:[{value:"monthly",label:"Monthly"},{value:"quarterly",label:"Quarterly"},{value:"annually",label:"Annual"}]}]}/>;
  else if(tab==="scenarios")content=<ScenariosTab token={token} demoP={demoP}/>;
  else if(tab==="analytics")content=<EngineTab token={token} demoP={demoP} title="Full Analytics" desc="Comprehensive risk decomposition." endpoint="/api/v1/analytics/full" controls={[]}/>;
  else if(tab==="news")content=<NewsTab/>;
  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:T.body,color:C.navy2,display:"flex",flexDirection:"column"}}>
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 32px",borderBottom:`1px solid ${C.border}`,background:C.white,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontFamily:T.display,fontSize:22,fontWeight:700,color:C.navy2,letterSpacing:"-0.02em"}}>GrineOS</span>
          <span style={{fontSize:12,color:C.soft}}>Regime-Driven Allocation Intelligence</span>
          {regimeLoading&&<span style={{fontSize:11,color:C.faint,fontFamily:T.mono}}>· loading engine…</span>}
          {regimeError&&<span style={{fontSize:11,color:C.red,fontFamily:T.mono}}>· engine offline</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <span style={{fontSize:12,color:C.soft}}>KG&Co Capital Advisory · London · New York</span>
          <div style={{width:1,height:16,background:C.border}}/>
          <span style={{fontSize:12,color:C.faint}}>{userEmail}</span>
          <button onClick={onLogout} style={{...btnOutline,padding:"6px 14px",fontSize:11,color:C.red,borderColor:C.red+"44"}}>Sign Out</button>
        </div>
      </header>
      <RegimeTopBar/>
      <nav style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,background:C.white,paddingLeft:32,flexShrink:0}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{padding:"12px 20px",border:"none",borderBottom:tab===t.id?`2px solid ${C.navy2}`:"2px solid transparent",background:"transparent",color:tab===t.id?C.navy2:C.soft,fontFamily:T.body,fontSize:13,fontWeight:tab===t.id?600:400,cursor:"pointer",transition:"all .15s"}}>{t.label}</button>)}
      </nav>
      <main style={{flex:1,overflow:"auto"}}>{content}</main>
      <footer style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 32px",borderTop:`1px solid ${C.border}`,background:C.white,fontSize:11,color:C.faint,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{display:"flex",alignItems:"center"}}><Dot ok={health?.status==="healthy"||health?.status==="ok"}/>Platform API <Tag color={health?.status==="healthy"||health?.status==="ok"?C.green:C.red}>{health?.status||"—"}</Tag></div>
          <div style={{display:"flex",alignItems:"center"}}><Dot ok={!regimeError}/>Engine A <Tag color={regimeError?C.red:C.green}>{regimeError?"offline":"live"}</Tag></div>
        </div>
        <div>Grine Technologies Ltd · A KG&Co Company</div>
      </footer>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const[token,setToken]=useState(null);const[email,setEmail]=useState("");
